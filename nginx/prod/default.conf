# Shared memory zone for tracking client IPs
limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;

# Single certificate for all domains
ssl_certificate     /etc/letsencrypt/live/www.testohsal.com/cert.pem;
ssl_certificate_key /etc/letsencrypt/live/www.testohsal.com/privkey.pem;

ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

log_format simple '$remote_addr [$time_local] "$request" $status $body_bytes_sent';

access_log /var/log/nginx/access.log simple;
error_log /var/log/nginx/error.log warn;


server {
    listen 80;
    server_name testohsal.com www.testohsal.com;

    access_log /var/log/nginx/access.log simple;

    # ACME challenge path for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        # Apply the rate limit
        limit_req zone=one burst=20 nodelay;
        # Too Many Requests if limit exceeded
        limit_req_status 503;

        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name testohsal.com www.testohsal.com;
    access_log /var/log/nginx/access.log simple;

    location / {
        # Apply the rate limit
        limit_req zone=one burst=20 nodelay;
        # Too Many Requests if limit exceeded
        limit_req_status 503;

        proxy_pass http://ohsal:80;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
