name: "publish"

on:
  workflow_dispatch:
  push:
    branches:
      - app

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin" # M1 / Apple Silicon
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin" # Intel Mac

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: ./ui

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential curl

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ui/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ohsal-v__VERSION__
          releaseName: "ohsal v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: List macOS bundle folder
        if: matrix.platform == 'macos-latest'
        run: ls -l ./ui/src-tauri/target

      - name: List macOS bundle folder
        if: matrix.platform == 'macos-latest'
        run: ls -l ./ui/src-tauri/target/release

      - name: Upload build artifacts - macOS
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ohsal-macos
          path: ./ui/src-tauri/target/release/bundle/macos/*.dmg

      - name: Upload build artifacts - Linux
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ohsal-linux
          path: ./ui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload build artifacts - Windows
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ohsal-windows
          path: ./ui/src-tauri/target/release/bundle/msi/*.msi
